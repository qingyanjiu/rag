# ============================================================
# Qwen2.5 + Unsloth 微调 — RAG 模式
# ============================================================
# 使用 RAG 格式数据集进行训练：
#   每条数据包含 context（规则原文）+ instruction（问题）+ output（答案）
# 模型学会：基于给定的规则上下文回答问题
# ============================================================

model:
  name: "Qwen/Qwen2.5-1.5B-Instruct"
  load_in: "4bit"
  quant:
    bnb_4bit_compute_dtype: "bfloat16"
    bnb_4bit_quant_type: "nf4"
    bnb_4bit_use_double_quant: true

lora:
  r: 16
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  lora_alpha: 16
  lora_dropout: 0
  bias: "none"
  use_rslora: false
  use_dora: false

training:
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 2
  warmup_steps: 10
  num_train_epochs: 8
  max_steps: -1
  learning_rate: 3.0e-4
  optim: "adamw_8bit"
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  seed: 42
  logging_steps: 5
  save_strategy: "no"
  save_total_limit: 1
  eval_strategy: "steps"
  eval_steps: 62
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  report_to: "none"
  dataloader_num_workers: 2
  packing: false

max_seq_length: 2048

# --------------- RAG 数据配置 ---------------
data:
  # 使用 RAG 格式数据集（含 context 字段）
  train_file: "./data/train_rag.jsonl"
  eval_file: "./data/eval_rag.jsonl"

  # 格式: "rag"
  format: "rag"

  # Alpaca 的 combine_input 兼容
  alpaca_combine_input: true

  # 数据集划分比例（当只提供 train_file 时）
  train_split_ratio: 0.9

output:
  output_dir: "./outputs_rag"
  merged_dir: "./outputs_rag/merged_model"
  save_merged: true
  save_format: "hf"
