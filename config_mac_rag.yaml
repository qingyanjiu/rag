# ============================================================
# Mac M系列 微调 — RAG 模式
# ============================================================
# 使用 RAG 格式数据集，每条含 context + instruction + output
# 模型学会基于规则上下文回答问题
# ============================================================

model: "Qwen/Qwen2.5-1.5B-Instruct"
train: true
fine_tune_type: "lora"
optimizer: "adamw"

# RAG 格式数据目录（用 train_mac.py 自动转换）
data: "./outputs_mac_rag/_mlx_data"

# RAG 训练数据
train_file: "./data/train_rag.jsonl"
eval_file: "./data/eval_rag.jsonl"
data_format: "rag"               # ← 重要：使用 RAG 格式

# LoRA
lora_parameters:
  rank: 8
  scale: 10.0
  dropout: 0.0

# 训练
batch_size: 1
grad_accumulation_steps: 4
iters: 500
learning_rate: 5.0e-5
max_seq_length: 1024
num_layers: -1
seed: 42
val_batches: -1

mask_prompt: true
lr_schedule:
  name: "cosine_decay"
  arguments: [5.0e-5, 2900, 1.0e-6]
  warmup: 100
  warmup_init: 0.0
grad_checkpoint: true

steps_per_report: 5
steps_per_eval: 100
save_every: 500
adapter_path: "./outputs_mac_rag/adapter"

output_dir: "./outputs_mac_rag"
